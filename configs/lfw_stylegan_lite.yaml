seed: 42
device: auto

data:
  root: data/lfw-py
  dataset: recursive_images
  image_size: 64
  num_workers: 2

model:
  name: stylegan_lite
  z_dim: 128
  w_dim: 256
  style_mixing_prob: 0.5

train:
  epochs: 100
  batch_size: 64
  lr: 0.0002
  beta1: 0.5
  beta2: 0.999
  real_label: 0.9
  fake_label: 0.0
  sample_every_epochs: 1
  checkpoint_every_epochs: 1

eval:
  compute_every_epochs: 10
  num_images: 2048
  batch_size: 64

paths:
  output_dir: runs/stylegan_lite_lfw
